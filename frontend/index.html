<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetPlay - Task Manager | DevOps Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 NetPlay Task Manager</h1>
            <div class="network-badge">
                <span id="networkStatus">Checking network...</span>
            </div>
        </header>

        <div class="network-info-panel">
            <h3>📡 Network Information</h3>
            <div id="networkDetails">
                <p>Loading network details...</p>
            </div>
        </div>

        <div class="task-form">
            <h2>Create New Task</h2>
            <input type="text" id="taskTitle" placeholder="Task Title" required>
            <textarea id="taskDesc" placeholder="Task Description" rows="3"></textarea>
            <button onclick="createTask()">Add Task ➕</button>
        </div>

        <div class="tasks-section">
            <h2>Your Tasks</h2>
            <div id="tasksList" class="tasks-grid">
                <p>Loading tasks...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>DevOps Demo | Reverse Proxy | CORS | Load Balancing | Network Monitoring</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
